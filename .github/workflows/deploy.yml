name: deploy

# Deploys ONLY what is on origin/main (never a laptop working tree), with a
# committed task-def env (render_taskdef.py — the single source of truth), and a
# smoke-test + selfcheck gate that auto-rolls-back. This replaces deploy.ps1 /
# deploy.mac.ps1. See docs/MASE_CONTEXT.md + docs/API_INVENTORY.md.

on:
  push:
    branches: [main]
    paths-ignore: ['docs/**', '*.md', '.agents/**']
  workflow_dispatch:

concurrency:
  group: deploy-prod          # never run two deploys at once
  cancel-in-progress: false

env:
  AWS_REGION: ap-south-1
  ECR_REPO: 022187637784.dkr.ecr.ap-south-1.amazonaws.com/mase-service
  CLUSTER: mase-cluster
  ALB_DNS: mase-alb-1262623499.ap-south-1.elb.amazonaws.com
  LISTENER: arn:aws:elasticloadbalancing:ap-south-1:022187637784:listener/app/mase-alb/176c820e3f56b935/c6710f58972ca338
  # HTTPS:443 listener — fronts https://mase-api.zycus.com (the Teams bot messaging
  # endpoint). MUST be flipped in lockstep with the HTTP listener or a deploy leaves
  # 443 pointing at the drained colour and the bot's endpoint dies.
  HTTPS_LISTENER: arn:aws:elasticloadbalancing:ap-south-1:022187637784:listener/app/mase-alb/176c820e3f56b935/900dc459aa97463c
  TG_BLUE: arn:aws:elasticloadbalancing:ap-south-1:022187637784:targetgroup/mase-blue/71c71534374ec831
  TG_GREEN: arn:aws:elasticloadbalancing:ap-south-1:022187637784:targetgroup/mase-green/c8b1ab1c4dff2dbf

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write          # OIDC: assume the AWS deploy role — NO stored secrets
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::022187637784:role/mase-github-deploy-role
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Fetch real MCP config + guard
        run: |
          set -euo pipefail
          # The real connector config (mcp_config.json) carries secrets and is
          # gitignored, so a CI checkout only has the sanitized mcp_config.example.json.
          # Without this, the image ships NO mcp_config.json -> server.py writes a default
          # with zero enabled MCP servers -> every sweep worker crash-loops on
          # "MCP tools did not load in time" (the 2026-06-24 incident). Pull the real
          # config from Secrets Manager and bake it into the build context.
          aws secretsmanager get-secret-value --secret-id mase/mcp-config \
            --query SecretString --output text > mcp_config.json
          # Hard guard: refuse to build unless salesforce + avoma are present AND enabled.
          # This makes a broken-MCP image impossible to ship, no matter who pushes.
          python - <<'PY'
          import json, sys
          try:
              servers = (json.load(open("mcp_config.json")).get("mcp_servers") or {})
          except Exception as e:
              sys.exit(f"FATAL: mcp_config.json from mase/mcp-config is not valid JSON: {e}")
          bad = [s for s in ("salesforce", "avoma") if not (servers.get(s) or {}).get("enabled")]
          if bad:
              sys.exit(f"FATAL: mcp_config.json is missing/disabled required MCP server(s) {bad} "
                       "- refusing to build a broken image. Fix the mase/mcp-config secret.")
          n = sum(1 for s in servers.values() if s.get("enabled"))
          print(f"mcp_config.json OK: {n} enabled servers incl salesforce + avoma")
          PY

      - name: Build & push image
        run: |
          set -euo pipefail
          TAG="${GITHUB_SHA::7}-$(date -u +%Y%m%dT%H%M%SZ)"
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "IMAGE=$ECR_REPO:$TAG" >> "$GITHUB_ENV"
          docker build -t "$ECR_REPO:$TAG" .
          docker push "$ECR_REPO:$TAG"

      - name: Render & register task definitions
        run: |
          set -euo pipefail
          python .github/deploy/render_taskdef.py "$IMAGE" api-td.json worker-td.json
          API_TD=$(aws ecs register-task-definition --cli-input-json file://api-td.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          WORKER_TD=$(aws ecs register-task-definition --cli-input-json file://worker-td.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "API_TD=$API_TD" >> "$GITHUB_ENV"
          echo "WORKER_TD=$WORKER_TD" >> "$GITHUB_ENV"
          echo "registered $API_TD / $WORKER_TD"

      - name: Determine live/idle colour
        run: |
          set -euo pipefail
          WEIGHTS=$(aws elbv2 describe-rules --listener-arn "$LISTENER" \
            --query "Rules[?IsDefault].Actions[0].ForwardConfig.TargetGroups" --output json)
          LIVE_TG=$(echo "$WEIGHTS" | python -c "import json,sys;tg=json.load(sys.stdin)[0];print([t['TargetGroupArn'] for t in tg if t['Weight']==100][0])")
          if [ "$LIVE_TG" = "$TG_BLUE" ]; then LIVE=blue; IDLE=green; IDLE_TG=$TG_GREEN;
          else LIVE=green; IDLE=blue; IDLE_TG=$TG_BLUE; fi
          echo "LIVE=$LIVE"   >> "$GITHUB_ENV"
          echo "IDLE=$IDLE"   >> "$GITHUB_ENV"
          echo "IDLE_TG=$IDLE_TG" >> "$GITHUB_ENV"
          echo "LIVE_TG=$LIVE_TG" >> "$GITHUB_ENV"
          echo "live=$LIVE idle=$IDLE"

      - name: Deploy image to idle colour
        run: |
          set -euo pipefail
          # --desired-count 2: the idle colour was drained to 0 by the previous deploy's
          # "drain old colour" step, so we must scale it back up or it never gets healthy.
          aws ecs update-service --cluster "$CLUSTER" --service "mase-api-$IDLE" \
            --task-definition "$API_TD" --desired-count 2 >/dev/null
          aws ecs wait services-stable --cluster "$CLUSTER" --services "mase-api-$IDLE"
          aws elbv2 wait target-in-service --target-group-arn "$IDLE_TG"
          echo "idle ($IDLE) healthy on new image"

      - name: Flip ALB listener to idle
        run: |
          set -euo pipefail
          cat > flip.json <<EOF
          [{"Type":"forward","ForwardConfig":{"TargetGroups":[
            {"TargetGroupArn":"$IDLE_TG","Weight":100},
            {"TargetGroupArn":"$LIVE_TG","Weight":0}]}}]
          EOF
          aws elbv2 modify-listener --listener-arn "$LISTENER" --default-actions file://flip.json >/dev/null
          # Flip the HTTPS:443 listener too, or https://mase-api.zycus.com (the Teams bot
          # endpoint) stays pointed at the drained colour after this deploy.
          aws elbv2 modify-listener --listener-arn "$HTTPS_LISTENER" --default-actions file://flip.json >/dev/null
          echo "FLIPPED=1" >> "$GITHUB_ENV"
          echo "flipped -> $IDLE (HTTP + HTTPS)"

      - name: Deploy sweep worker
        run: |
          set -euo pipefail
          aws ecs update-service --cluster "$CLUSTER" --service mase-worker \
            --task-definition "$WORKER_TD" >/dev/null
          echo "worker rolled to new image (autoscaler manages count)"

      - name: Smoke test + selfcheck (gate)
        env:
          BASE_URL: http://mase-alb-1262623499.ap-south-1.elb.amazonaws.com
        run: |
          set -euo pipefail
          sleep 10
          # bearer token from Secrets Manager (the deploy role can read mase/app-env) — no GitHub secret needed
          TOKEN=$(aws secretsmanager get-secret-value --secret-id mase/app-env --query SecretString --output text \
            | python -c "import json,sys;d=json.load(sys.stdin);print(d.get('API_AUTH_TOKEN') or d.get('DISPATCH_SECRET') or '')")
          export TOKEN
          chmod +x scripts/smoke_test.sh
          ./scripts/smoke_test.sh
          SC=$(curl -s "$BASE_URL/api/deal-engine/selfcheck" -H "Authorization: Bearer $TOKEN")
          echo "selfcheck: $SC"
          echo "$SC" | python -c "import json,sys;d=json.load(sys.stdin);sys.exit(0 if d.get('ok') else 1)"

      - name: Drain old colour (deploy succeeded)
        run: aws ecs update-service --cluster "$CLUSTER" --service "mase-api-$LIVE" --desired-count 0 >/dev/null

      - name: ROLLBACK on failure
        if: failure() && env.FLIPPED == '1'
        run: |
          set -euo pipefail
          cat > rb.json <<EOF
          [{"Type":"forward","ForwardConfig":{"TargetGroups":[
            {"TargetGroupArn":"$LIVE_TG","Weight":100},
            {"TargetGroupArn":"$IDLE_TG","Weight":0}]}}]
          EOF
          aws elbv2 modify-listener --listener-arn "$LISTENER" --default-actions file://rb.json >/dev/null
          aws elbv2 modify-listener --listener-arn "$HTTPS_LISTENER" --default-actions file://rb.json >/dev/null
          echo "::error::Deploy failed post-flip — rolled the ALB (HTTP + HTTPS) back to $LIVE."
